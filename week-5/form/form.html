<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Form</h1>
    <form>
        <div class="input">
            <label for="username">Username</label>
            <input type="text" name="username" id="usernmae" placeholder="Enter username" autocomplete="off" required minlength="4" maxlength="12">
        </div>
        <div class="input">
            <label for="password">Password</label>
            <input type="password" name="password" id="password">
        </div>
        <div>
            <input type="checkbox" name="React" id="react">
            <label for="checkbox">React</label>
        </div>
        <div>
            <input type="checkbox" name="Angular" id="angular">
            <label for="checkbox">Angular</label>
        </div>

        <div>
            <button type="submit">submit</button>
        </div>
    </form>
</body>
</html>
